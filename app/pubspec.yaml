name: fitquest
description: "FitQuest — 12-week weight-loss coaching app (neumorphic)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Fonts & icons
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2785.1

  # Charts (weight progress)
  fl_chart: ^0.69.2

  # Camera / images (meal photo)
  image_picker: ^1.1.2

  # Payments
  razorpay_flutter: ^1.3.7

  # Secure token storage + prefs
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Misc
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
